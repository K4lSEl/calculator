<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-calculator</title>
  </head>

  <body>
    <div id="calculator">
      <div id="display">
        <span id="history-value"></span>
        <span id="display-value"></span>
      </div>
      <div id="button-grid">
        <!-- 1行目 -->
        <button class="input-btn" data-value="7">7</button>
        <button class="input-btn" data-value="8">8</button>
        <button class="input-btn" data-value="9">9</button>
        <button class="operator-btn" data-value="÷">÷</button>
        <!-- 2行目 -->
        <button class="input-btn" data-value="4">4</button>
        <button class="input-btn" data-value="5">5</button>
        <button class="input-btn" data-value="6">6</button>
        <button class="operator-btn" data-value="×">×</button>
        <!-- 3行目 -->
        <button class="input-btn" data-value="1">1</button>
        <button class="input-btn" data-value="2">2</button>
        <button class="input-btn" data-value="3">3</button>
        <button class="operator-btn" data-value="-">-</button>
        <!-- 4行目 -->
        <button class="input-btn" data-value="0">0</button>
        <button class="input-btn" data-value=".">.</button>
        <button class="input-btn" data-value="C">C</button>
        <button class="operator-btn" data-value="+">+</button>
      </div>
      <div id="submit">
        <button class="submit-btn" data-value="=">=</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
